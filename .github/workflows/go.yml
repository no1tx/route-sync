name: Go

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - run: go mod tidy
      - run: git diff --exit-code

      - run: go vet ./...
      - run: go test -v ./...
      - run: go build -v ./...

  release-linux:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Build generic Linux binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/route-sync-linux-amd64 \
            ./cmd/route-sync

      - name: Pack
        run: |
          cd dist
          tar -czf route-sync-linux-amd64.tar.gz route-sync-linux-amd64
          sha256sum route-sync-linux-amd64.tar.gz > route-sync-linux-amd64.tar.gz.sha256

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/route-sync-linux-amd64.tar.gz \
            dist/route-sync-linux-amd64.tar.gz.sha256 \
            --clobber
