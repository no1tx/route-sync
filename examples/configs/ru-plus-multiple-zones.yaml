# RU default plus multiple special zones.
# Lower numeric rule priorities are evaluated first by Linux policy routing.

global:
  refresh_interval: 30m
  health_check_interval: 5s
  http_timeout: 20s
  state_dir: /var/lib/route-sync
  log_format: json
  metrics_listen: 127.0.0.1:9108
  route_protocol: 99
  rule_priority_base: 1000
  rule_priority_step: 10
  enable_prefix_aggregation: true

defaults:
  enable_ru_builtin_source: true

routing:
  ru_default:
    enabled: true
    source:
      type: ripe_country
      country: RU
    target:
      table: 100
      dev: eth0
      onlink: false
      family: dual
      gateways:
        - name: primary-uplink
          via4: 192.0.2.1
          via6: 2001:db8:100::1
        - name: backup-uplink
          via4: 198.51.100.1
          via6: 2001:db8:101::1
    rule:
      enabled: true
      priority: 2000
      fwmark: 100
      mask: 255
      table: 100

special_zones:
  - name: telegram
    enabled: true
    source:
      type: txt
      url: examples/fixtures/txt/telegram.txt
    target:
      table: 200
      dev: tailscale0
      onlink: true
      family: dual
      health_check:
        targets:
          - 149.154.167.99
          - 149.154.175.50
      gateways:
        - name: ts-primary
          via4: 100.64.0.10
          via6: fd7a:115c:a1e0::10
        - name: ts-backup
          via4: 100.64.0.11
          via6: fd7a:115c:a1e0::11
    rule:
      enabled: true
      priority: 1000
      fwmark: 200
      mask: 255
      table: 200

  - name: youtube-eu
    enabled: true
    source:
      type: txt
      url: examples/fixtures/txt/youtube_eu.txt
    target:
      table: 201
      dev: wg0
      family: ipv4
      gateways:
        - name: eu-primary
          via4: 10.10.10.1
        - name: eu-backup
          via4: 10.10.10.2
    rule:
      enabled: true
      priority: 1010
      fwmark: 201
      mask: 255
      table: 201

  - name: corporate-vpn
    enabled: true
    source:
      type: txt
      url: examples/fixtures/txt/corporate_vpn.txt
    target:
      table: 202
      dev: tun0
      onlink: false
      family: dual
      health_check:
        targets:
          - 10.42.255.10
      gateways:
        - name: corp-primary
          via4: 10.42.255.1
          via6: fd42:77::1
        - name: corp-backup
          via4: 10.42.255.2
          via6: fd42:78::1
    rule:
      enabled: true
      priority: 1020
      fwmark: 202
      mask: 255
      table: 202
      from: 10.42.0.0/16
