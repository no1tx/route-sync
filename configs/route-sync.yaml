global:
  refresh_interval: 1h
  health_check_interval: 5s
  http_timeout: 30s
  state_dir: /var/lib/route-sync
  log_format: text
  metrics_listen: 127.0.0.1:9108
  route_protocol: 99
  rule_priority_base: 1000
  rule_priority_step: 10
  enable_prefix_aggregation: true
  cleanup_on_shutdown: false

defaults:
  enable_ru_builtin_source: true

routing:
  ru_default:
    enabled: true
    source:
      type: ripe_country
      country: RU
    target:
      table: 100
      dev: eth0
      onlink: false
      family: dual
      gateways:
        - name: primary-uplink
          via4: 192.0.2.1
          via6: 2001:db8:100::1
        - name: backup-uplink
          via4: 198.51.100.1
          via6: 2001:db8:101::1
    rule:
      enabled: true
      priority: 2000
      fwmark: 100
      mask: 255
      table: 100

special_zones:
  - name: telegram
    enabled: true
    source:
      type: txt
      url: https://example.com/telegram_cidrs.txt
    target:
      table: 200
      dev: tailscale0
      onlink: true
      family: dual
      health_check:
        targets:
          - 149.154.167.99
          - 149.154.175.50
      gateways:
        - name: ts-primary
          via4: 100.64.0.10
          via6: fd7a:115c:a1e0::10
        - name: ts-backup
          via4: 100.64.0.11
          via6: fd7a:115c:a1e0::11
    rule:
      enabled: true
      priority: 1000
      fwmark: 200
      mask: 255
      table: 200

  - name: youtube-eu
    enabled: true
    source:
      type: txt
      url: file:///etc/route-sync/youtube_eu.txt
    target:
      table: 201
      dev: wg0
      family: ipv4
      gateways:
        - name: eu-primary
          via4: 10.10.10.1
        - name: eu-backup
          via4: 10.10.10.2
    rule:
      enabled: true
      priority: 1010
      fwmark: 201
      mask: 255
      table: 201
